<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O-Tech Studio | Premium Assets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.snipcart.com/themes/v3.4.1/default/snipcart.css" />
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-8px); shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 glass border-b border-slate-200 px-6 py-4 flex justify-between items-center">
        <div class="text-2xl font-extrabold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">
            O-Tech Studio
        </div>
        <button class="snipcart-checkout flex items-center gap-2 bg-slate-900 text-white px-5 py-2 rounded-full font-bold hover:bg-blue-600 transition-all">
            <span class="snipcart-items-count text-sm">0</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
            </svg>
        </button>
    </nav>

    <header class="py-20 px-6 text-center">
        <h1 class="text-5xl md:text-6xl font-extrabold text-slate-900 mb-4 tracking-tight">Premium Business Tools</h1>
        <p class="text-slate-500 max-w-2xl mx-auto text-lg">Build, automate, and scale your business with our top-rated digital assets.</p>
    </header>

    <main id="product-container" class="max-w-7xl mx-auto px-6 pb-20 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
        </main>

    <footer class="text-center py-10 border-t border-slate-200 text-slate-400 text-sm">
        &copy; 2026 O-Tech Global. All rights reserved.
    </footer>

    <script async src="https://cdn.snipcart.com/themes/v3.4.1/default/snipcart.js"></script>
    <div hidden id="snipcart" data-api-key="YjJmYjY5YjUtY2I3Mi00YjVjLTk5ZTYtY2Y5N2VlZWYyNTM2NjM4NTEyMTU2OTkxMDM0OTEx"></div>
    
    <script src="script.js"></script>
</body>
</html>
